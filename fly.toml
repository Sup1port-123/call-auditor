# Fly.io config for the call-auditor Streamlit app.
# `fly launch` will rename `app` if the slug is taken.

app = "call-auditor"
primary_region = "bom"   # Mumbai. Change with `fly regions set <code>` if needed.

[build]

[env]
  AUDITOR_CACHE_DIR = "/data"
  OLLAMA_DISABLED   = "true"
  TRANSCRIBER       = "assemblyai"
  LLM_PROVIDER      = "gemini"

# Persistent volume for SQLite audit history + transcript cache.
# Create once: `fly volumes create auditor_data --region bom --size 1`
[[mounts]]
  source      = "auditor_data"
  destination = "/data"

[http_service]
  internal_port       = 8501
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes           = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout  = "5s"
    grace_period = "20s"
    method   = "get"
    path     = "/_stcore/health"

[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory_mb = 1024
