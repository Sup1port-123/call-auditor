services:
  - type: web
    name: call-auditor
    runtime: python
    plan: starter   # Free tier sleeps after 15min idle and has no persistent disk. Upgrade to Starter ($7/mo) for always-on + the disk below.
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --server.enableCORS=false --server.enableXsrfProtection=false
    healthCheckPath: /_stcore/health
    disk:
      name: auditor-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: AUDITOR_CACHE_DIR
        value: /var/data
      - key: OLLAMA_DISABLED
        value: "true"
      - key: TRANSCRIBER
        value: assemblyai
      - key: LLM_PROVIDER
        value: gemini
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: ASSEMBLYAI_API_KEY
        sync: false
